listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;
srs_log_level       trace;

# HTTP Server
http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
    crossdomain     on;
}

# HTTP API
http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;
}

# Default vhost with HTTP hooks
vhost __defaultVhost__ {
    http_hooks {
        enabled         on;

        on_publish              http://game-x.api:8080/hooks/srs/on-publish;
        on_unpublish            http://game-x.api:8080/hooks/srs/on-unpublish;
        on_play                 http://game-x.api:8080/hooks/srs/on-play;
        on_stop                 http://game-x.api:8080/hooks/srs/on-stop;
    }

    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    10;
        hls_window      60;
        hls_aof_ratio   2.0;
    }

    rtc {
        enabled     on;
        bframe      discard;
    }
}
