services:
  game-x.db:
    image: postgres:16.4

  game-x.api:
    image: game-x.api
    build:
      context: .
      dockerfile: game-x.api/Dockerfile

  game-x.seq:
    image: datalust/seq:latest

  game-x.srs:
    image: ossrs/srs:5

networks:
  dls-gamex:
    external: true

volumes:
  seq-data:
  srs-data:
  db-data:
